version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: task_management
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  auth-service:
    image: python:3.11-slim
    working_dir: /app/backend
    command: sh -c "pip install -r requirements.txt && uvicorn auth_service.auth_server:app --host 0.0.0.0 --port 3000"
    volumes:
      - ./:/app
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
    ports:
      - "3000:3000"

  task-service:
    image: python:3.11-slim
    working_dir: /app/backend
    command: sh -c "pip install -r requirements.txt && uvicorn task_service.task_server:app --host 0.0.0.0 --port 3001"
    volumes:
      - ./:/app
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
    ports:
      - "3001:3001"

  frontend:
    image: node:22-alpine
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 4200"
    volumes:
      - ./:/app
    env_file:
      - ./frontend/.env
    depends_on:
      - auth-service
      - task-service
    ports:
      - "4200:4200"

volumes:
  postgres_data:
